<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>HTML 샘플</title>
	<style type="text/css">
		.container{
			width: 940px;
			margin: 0px auto;
			padding: 20px;
			border: 1px solid #bcbcbc;
		}
		
		header{ padding: 20px; margin-bottm: 20px; border: 1px solid #bcbcbc; }
		
		#sidebar{
			width: 260px;
			padding:20px;
			margin-bottom: 20px;
			border: 1px solid #bcbcbc; 
			float: left;
		}
		
		.content{
			width: 580px;
			padding: 20px;
			margin-bottom: 20px;
			border: 1px solid #bcbcbc;
			float: right;
		}
		
		footer{
			clear: both;
			padding: 20px;
			border: 1px solid #bcbcbc;
		}
		
		li{
			font-size: 20pt;
			color: red;
		}
		
	</style>
	<script src="./js/jquery-3.5.1.js" text="text/javascript"></script>
</head>
<body>
<div class="container">
	<!-- //상단 -->
	<header>
		<h1>상단 헤더 영역</h1>
	</header>

	<!-- //좌측 -->
	<div id="sidebar">
		<h2>좌측 메뉴 영역</h2>
		<ul>
			<li><a href="http://#" target="_blank">구글</a></li>
			<li><a href="http://http://www.naver.com" target="_blank">네이버</a></li>
			<li><a href="http://#" target="_blank">다음</a></li>
		</ul>
	</div>

	<!-- //우측 -->
	<div class="content">
		<section>
			<h2>본문</h2>
			<p>
				첫번째 단락 본문글입니다.
			</p>
			<p>
				두번째 단락 본문글입니다.
			</p>
			<br />
			<form id="mailform" action="./sample3.html" method="post">
				메일발송 : <input type="text" id="txtemail" placeholder="메일주소입력" />
				<input type="submit" id="btnsend" value="Send" />
			</form>
		</section>
	</div>

	<!-- //하단 -->
	<footer>
		<p>바닥글</p>
	</footer>
</div>	
	<script type="text/javascript">
		$(document).ready(function(){
			$("#btnsend").click(function(){
				if ($("#txtemail").val() == "") {
					alert("메일주소를 입력해주세요.");
					$("#txtemail").focus();
					return false;
					}
					var regex = /^([\w-]+(?:\.[\w-]+)*)@((?:[\w-]+\.)*\w[\w-]{0,66})\.([a-z]{2,6}(?:\.[a-z]{2})?)$/;
					if (regex.test($("#txtemail").val()) == false) {
					alert("잘못된 이메일 형식입니다.");
					$("#txtemail").focus();
					return false;
					}
					if (confirm("메시지를 전송하시겠습니까?")) {
					alert("전송되었습니다.!");
					return true;
					} else {
					return false;
					}
			});
			
			//
			$("h2").css("color","red");
			//
			
			//
			
			//
		});
	</script>
</body>
</html>
