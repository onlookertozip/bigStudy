<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>3단 레이아웃 연습</title>
	<style type="text/css">		
		#3tier-container{
			width: 940px;
			margin: 0px auto;
			padding: 20px;
			border: 1px solid #bcbcbc;
		}
		
		<!-- 헤더 -->
		#3tier-header{
			padding: 20px;
			margin-bottom: 20px;
			border: 1px solid #bcbcbc;
		}
		
		<!-- lnb -->
		#3tier-sidebar-left{
			width: 160px;
			border: 1px solid #bcbcbc;
			float: left;
		}
		
		<!-- 본문 -->
		#3tier-content{
			width: 450px;
			border: 1px solid #bcbcbc;
			float: left;
		}
		
		<!-- rnb -->
		#3tier-sidebar-right{
			width: 160px;
			border: 1px solid #bcbcbc;
			float: right;
		}
		
		<!-- 풋터 -->
		#3tier-footer{
			border: 1px solid #bcbcbc;
		}
	</style>
</head>
<body>
<div id="3tier-container">
	<!-- 헤더 -->
	<div id="3tier-header">
		<h1>3-Column Layout</h1>
	</div>
	
	<!-- lnb -->
	<div id="3tier-sidebar-left">
		<h2>Sidebar</h2>
		<ul>
			<li>SidebarMenu1</li>
			<li>SidebarMenu2</li>
			<li>SidebarMenu3</li>
		</ul>
	</div>
	<!-- 본문 -->
	<div id="3tier-content">
		<h2>Content</h2>
	</div>
	
	<!-- rnb -->
	<div id="3tier-sidebar-right">
		<h2>Sidebar</h2>
		<ul>
			<li>SidebarMenu1</li>
			<li>SidebarMenu2</li>
			<li>SidebarMenu3</li>
		</ul>
	</div>
	
	<!-- 풋터 -->
	<div id="3tier-footer">
		<p>Copyright</p>
	</div>
</div>
</body>
</html>
